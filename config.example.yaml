source:
  type: local
  path: ./example
  copy: true
  recursive: true
  include:
    - '*.jpg'
    - '*.jpeg'
    - '*.png'
    - '*.gif'
    - '*.webp'
    - '*.mp4'
    - '*.webm'
    - '*.mp3'
    - '*.wav'
    - '*.pdf'
    - '*.txt'
    - '*.md'
  exclude:
    - '.DS_Store'
    - 'thumbs/'

buckets:
  - label: Cats
    path: ./example/sorted/cats
    shortcut: '1'
  - label: Dogs
    path: ./example/sorted/dogs
    shortcut: '2'
  - label: Other
    path: ./example/sorted/other
    shortcut: '3'
